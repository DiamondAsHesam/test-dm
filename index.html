<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پورتفولیو | Hesam</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #E7E7E7;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 0 24px;
        }

        .logo-outside {
            position: fixed;
            top: 20px;
            left: 32px;
            font-weight: 800;
            font-size: 1.6rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #1e1e2a, #2d2d3a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            z-index: 1001;
        }

        .date-outside {
            position: fixed;
            top: 20px;
            right: 32px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            font-weight: 500;
            background: rgba(0, 0, 0, 0.05);
            padding: 6px 14px;
            border-radius: 40px;
            color: #2c2c2e;
            backdrop-filter: blur(4px);
            z-index: 1001;
        }

        .navbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: auto;
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(14px);
            border-radius: 18px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 28px;
            z-index: 1000;
            border: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links li a {
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            color: #1f1f2b;
            transition: 0.2s;
        }

        .nav-links li a:hover {
            color: #000;
            opacity: 0.7;
        }

        .spacer {
            height: 100px;
        }

        @media (max-width: 780px) {
            .logo-outside {
                font-size: 1.2rem;
                top: 22px;
                left: 20px;
            }
            .date-outside {
                font-size: 0.7rem;
                top: 22px;
                right: 20px;
                padding: 4px 10px;
            }
            .navbar {
                padding: 8px 20px;
            }
            .nav-links {
                gap: 1rem;
            }
            .nav-links li a {
                font-size: 0.8rem;
            }
        }

        @media (max-width: 550px) {
            .nav-links li a {
                font-size: 0.7rem;
            }
            .nav-links {
                gap: 0.7rem;
            }
        }
    </style>
</head>
<body>

<div class="logo-outside">✧ HESAM</div>
<div class="date-outside" id="liveDate"></div>

<div class="navbar">
    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Portfolio</a></li>
        <li><a href="#">Skills</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</div>

<div class="spacer"></div>

<script>
    function updateDate() {
        const now = new Date();
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        const formatted = now.toLocaleDateString('en-US', options);
        document.getElementById('liveDate').innerText = formatted;
    }
    updateDate();
</script>
</body>
</html>
