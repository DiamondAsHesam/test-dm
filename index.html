<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پورتفولیو | Hesam</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: #E7E7E7;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 0 24px;
        }

        /* لوگو و ناوبری مثل قبل (حذف نشده، فقط تکرار نکردم) */
        .logo-outside {
            position: fixed;
            top: 20px;
            left: 32px;
            font-weight: 800;
            font-size: 1.6rem;
            background: linear-gradient(135deg, #1e1e2a, #2d2d3a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            z-index: 1001;
            opacity: 0;
            transform: translateY(-20px);
            animation: slideFadeIn 0.6s ease forwards;
            animation-delay: 0.1s;
        }
        .date-outside {
            position: fixed;
            top: 20px;
            right: 32px;
            font-family: monospace;
            font-size: 0.85rem;
            background: rgba(0,0,0,0.05);
            padding: 6px 14px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            z-index: 1001;
            opacity: 0;
            transform: translateY(-20px);
            animation: slideFadeIn 0.6s ease forwards;
            animation-delay: 0.2s;
        }
        .navbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(14px);
            border-radius: 18px;
            padding: 10px 28px;
            z-index: 1000;
            opacity: 0;
            transform: translateX(-50%) translateY(-20px);
            animation: slideFadeInNav 0.6s ease forwards;
            animation-delay: 0.15s;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }
        .nav-links li a {
            text-decoration: none;
            font-weight: 500;
            color: #1f1f2b;
        }
        .spacer { height: 140px; }

        /* بخش بالای شیپ (متن و مربع‌ها) مثل قبل */
        .above-shape {
            margin: 20px 24px 80px 24px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            opacity: 0;
            animation: slideFadeIn 0.6s forwards 0.4s;
        }
        .greeting-text {
            font-size: 2.5rem;
            font-weight: 800;
            background: rgba(255,255,240,0.3);
            backdrop-filter: blur(4px);
            padding: 12px 28px;
            border-radius: 60px;
        }
        .social-cubes {
            display: flex;
            gap: 45px;
        }
        .social-cube {
            width: 70px;
            height: 70px;
            background: #1e1e2a;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 700;
            color: white;
            transition: 0.25s;
            transform-origin: center;
        }
        .social-cube:hover {
            transform: translateY(-8px);
            background: rgb(142,22,0);
        }
        .social-cube:nth-child(1) { transform: translateY(-15px) rotate(-3deg); }
        .social-cube:nth-child(2) { transform: translateY(10px) rotate(2deg); }
        .social-cube:nth-child(3) { transform: translateY(-5px) rotate(5deg); }
        .social-cube:nth-child(4) { transform: translateY(20px) rotate(-4deg); }

        /* شیپ قرمز */
        .giant-shape {
            margin: 0 24px 20px 24px;
            height: 280px;
            background: rgb(142,22,0);
            border-radius: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px 0 70px;
            opacity: 0;
            transform: translateY(-50px);
            animation: slideFromTop 0.7s forwards 0.6s;
            box-shadow: 0 15px 30px -10px rgba(0,0,0,0.2);
        }
        .left-content { display: flex; flex-direction: column; gap: 12px; }
        .portfolio-text {
            font-size: 6.5rem;
            font-weight: 900;
            color: white;
            text-transform: uppercase;
            text-shadow: 4px 4px 0 rgba(0,0,0,0.2);
        }
        .small-handle {
            font-size: 2.2rem;
            background: rgba(0,0,0,0.35);
            padding: 8px 20px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }
        .character-container {
            width: 240px;
            height: 100%;
            display: flex;
            align-items: flex-end;
        }
        .character-img {
            width: 100%;
            height: auto;
            max-height: 115%;
            object-fit: contain;
            object-position: bottom center;
        }

        /* ========== المان انیمیشن‌دار خاص (بدون کانتینر اضافی) ========== */
        .animated-element {
            display: flex;
            justify-content: center;
            margin: 60px 0 80px 0;
            opacity: 0;
            transform: scale(0.8);
            animation: popIn 0.6s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
            animation-delay: 0.9s;
        }

        /* یک حلقه دوتایی با چرخش و ضربان */
        .double-ring {
            position: relative;
            width: 80px;
            height: 80px;
        }
        .ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(142,22,0,0.3);
            top: 0;
            left: 0;
            animation: pulse 2s ease-in-out infinite;
        }
        .ring:nth-child(2) {
            border-color: rgb(142,22,0);
            width: 60%;
            height: 60%;
            top: 20%;
            left: 20%;
            animation: rotate 3s linear infinite, pulse 1.8s ease-in-out infinite reverse;
        }
        .ring:nth-child(3) {
            border-color: rgba(0,0,0,0.2);
            width: 30%;
            height: 30%;
            top: 35%;
            left: 35%;
            animation: rotateRev 2.5s linear infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes rotateRev {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-360deg); }
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes slideFromTop {
            0% { opacity: 0; transform: translateY(-50px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideFadeIn {
            0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideFadeInNav {
            0% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            100% { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* ریسپانسیو */
        @media (max-width: 780px) {
            .giant-shape { height: 220px; padding: 0 30px; }
            .portfolio-text { font-size: 3.5rem; }
            .character-container { width: 150px; }
            .small-handle { font-size: 1.3rem; }
            .double-ring { width: 60px; height: 60px; }
        }
        @media (max-width: 550px) {
            .giant-shape { height: 160px; padding: 0 20px; }
            .portfolio-text { font-size: 2.2rem; }
            .character-container { width: 100px; }
            .small-handle { font-size: 0.9rem; }
            .double-ring { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>
    <div class="logo-outside">✧ HESAM</div>
    <div class="date-outside" id="liveDate"></div>
    <div class="navbar">
        <ul class="nav-links">
            <li><a href="#">Home</a></li><li><a href="#">About</a></li><li><a href="#">Portfolio</a></li><li><a href="#">Skills</a></li><li><a href="#">Contact</a></li>
        </ul>
    </div>
    <div class="spacer"></div>

    <div class="above-shape">
        <div class="greeting-text">👋 Hey There I'm Hesam</div>
        <div class="social-cubes">
            <div class="social-cube">?</div><div class="social-cube">?</div><div class="social-cube">?</div><div class="social-cube">?</div>
        </div>
    </div>

    <div class="giant-shape">
        <div class="left-content">
            <div class="portfolio-text">Portfolio</div>
            <div class="small-handle">@KnownAsHesam</div>
        </div>
        <div class="character-container">
            <img src="assets/photo/character.png" alt="character" class="character-img">
        </div>
    </div>

    <!-- المان انیمیشن‌دار خاص: حلقه‌های هم مرکز با چرخش و ضربان -->
    <div class="animated-element">
        <div class="double-ring">
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
        </div>
    </div>

    <script>
        function updateDate() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('liveDate').innerText = now.toLocaleDateString('en-US', options);
        }
        updateDate();
    </script>
</body>
</html>
