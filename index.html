<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پورتفولیو | Hesam</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #E7E7E7;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 0 24px;
        }

        .logo-outside {
            position: fixed;
            top: 20px;
            left: 32px;
            font-weight: 800;
            font-size: 1.6rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #1e1e2a, #2d2d3a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            z-index: 1001;
        }

        .date-outside {
            position: fixed;
            top: 20px;
            right: 32px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            font-weight: 500;
            background: rgba(0, 0, 0, 0.05);
            padding: 6px 14px;
            border-radius: 40px;
            color: #2c2c2e;
            backdrop-filter: blur(4px);
            z-index: 1001;
        }

        .navbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: auto;
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(14px);
            border-radius: 18px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 28px;
            z-index: 1000;
            border: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links li a {
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            color: #1f1f2b;
            transition: 0.2s;
        }

        .nav-links li a:hover {
            color: #000;
            opacity: 0.7;
        }

        .spacer {
            height: 160px;
        }

        .hero-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            position: relative;
        }

        .text-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            z-index: 1;
            margin-bottom: -40px;
        }

        .bg-text {
            font-size: 8rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            color: black;
            text-align: center;
            white-space: nowrap;
            font-family: 'Inter', sans-serif;
            user-select: none;
            pointer-events: none;
            text-shadow: 8px 8px 20px rgba(0, 0, 0, 0.25);
        }

        .shape-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            z-index: 2;
        }

        /* مستطیل با گوشه‌های خیلی گرد */
        .hero-shape {
            position: relative;
            width: 500px;
            height: 280px;
        }

        .rectangle {
            width: 100%;
            height: 100%;
            background: rgb(142, 22, 0);
            border-radius: 80px;
            position: relative;
            overflow: hidden;
        }

        .character-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            width: 160px;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .character-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        @media (max-width: 780px) {
            .logo-outside {
                font-size: 1.2rem;
                top: 22px;
                left: 20px;
            }
            .date-outside {
                font-size: 0.7rem;
                top: 22px;
                right: 20px;
                padding: 4px 10px;
            }
            .navbar {
                padding: 8px 20px;
            }
            .nav-links {
                gap: 1rem;
            }
            .nav-links li a {
                font-size: 0.8rem;
            }
            .hero-shape {
                width: 350px;
                height: 200px;
            }
            .rectangle {
                border-radius: 60px;
            }
            .bg-text {
                font-size: 3rem;
            }
            .text-container {
                margin-bottom: -20px;
            }
            .character-wrapper {
                width: 110px;
                height: 110px;
            }
        }

        @media (max-width: 550px) {
            .bg-text {
                font-size: 1.8rem;
            }
            .hero-shape {
                width: 280px;
                height: 160px;
            }
            .rectangle {
                border-radius: 50px;
            }
            .nav-links li a {
                font-size: 0.7rem;
            }
            .nav-links {
                gap: 0.7rem;
            }
            .text-container {
                margin-bottom: -15px;
            }
            .character-wrapper {
                width: 85px;
                height: 85px;
            }
        }
    </style>
</head>
<body>

<div class="logo-outside">✧ HESAM</div>
<div class="date-outside" id="liveDate"></div>

<div class="navbar">
    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Portfolio</a></li>
        <li><a href="#">Skills</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</div>

<div class="spacer"></div>

<div class="hero-section">
    <div class="text-container">
        <div class="bg-text" id="backText">KnownAsHesam</div>
    </div>
    <div class="shape-wrapper">
        <div class="hero-shape">
            <div class="rectangle"></div>
            <div class="character-wrapper">
                <img src="assets/photo/character.png" alt="character" class="character-img">
            </div>
        </div>
    </div>
</div>

<script>
    function updateDate() {
        const now = new Date();
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        const formatted = now.toLocaleDateString('en-US', options);
        document.getElementById('liveDate').innerText = formatted;
    }
    updateDate();

    let myText = "KnownAsHesam";
    document.getElementById('backText').innerText = myText;
</script>
</body>
</html>
